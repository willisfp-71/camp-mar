<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camp MAR">
<title>Camp MAR — Medication Administration Record</title>
<style>
:root{
  --bg:#f4f6f8; --card:#fff; --ink:#1a2733; --muted:#5b6b7a; --line:#dde4ea;
  --brand:#0e6e5c; --brand-dk:#0a5546; --accent:#1d6fb8;
  --ok:#1e8e3e; --warn:#b26a00; --bad:#c5221f; --held:#7b1fa2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:70px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:1rem;padding:10px;border:1px solid var(--line);border-radius:8px;width:100%;background:#fff}
label{font-size:.8rem;font-weight:600;color:var(--muted);display:block;margin:10px 0 4px}
h2{font-size:1.15rem;margin-bottom:10px}
h3{font-size:1rem;margin:14px 0 6px}
.hdr{background:var(--brand);color:#fff;padding:max(10px,env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hdr .t{font-weight:700;font-size:1.05rem}
.hdr .sub{font-size:.72rem;opacity:.85}
.chip{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:16px;padding:6px 12px;font-size:.78rem}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
.tabs button{flex:1;background:none;border:none;padding:9px 2px 7px;font-size:.68rem;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;min-height:52px}
.tabs button .ic{font-size:1.25rem}
.tabs button.on{color:var(--brand);font-weight:700}
.wrap{max-width:860px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.btn{display:inline-block;background:var(--brand);color:#fff;border:none;border-radius:9px;padding:12px 16px;font-size:.95rem;font-weight:600;min-height:44px}
.btn.sec{background:#eef2f5;color:var(--ink);border:1px solid var(--line)}
.btn.blue{background:var(--accent)}
.btn.bad{background:var(--bad)}
.btn.sm{padding:8px 12px;font-size:.82rem;min-height:38px}
.btn.blk{display:block;width:100%;text-align:center}
.btn:disabled{opacity:.45}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1;min-width:130px}
.muted{color:var(--muted);font-size:.82rem}
.tag{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff;vertical-align:middle}
.tag.boy{background:#1d6fb8}.tag.girl{background:#c2185b}
.tag.ctrl{background:#7b1fa2}.tag.prn{background:#b26a00}
.pill{display:inline-block;font-size:.7rem;padding:3px 9px;border-radius:10px;background:#eef2f5;border:1px solid var(--line);margin:2px 2px 0 0}
.cabin-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:5px;vertical-align:-1px}
.list-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 2px;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
.chips button{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:18px;padding:8px 14px;font-size:.82rem;min-height:40px}
.chips button.on{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:700}
.pass-hd{display:flex;align-items:center;justify-content:space-between;background:#e8f0ee;border-radius:9px;padding:10px 12px;margin:16px 0 8px}
.pass-hd .st{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:10px}
.st.open{background:#d7f0dd;color:var(--ok)}.st.soon{background:#fdf1d6;color:var(--warn)}.st.closed{background:#eee;color:#888}
.cabin-hd{font-size:.8rem;font-weight:700;margin:10px 0 4px;letter-spacing:.03em}
.med-line{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;background:#fff}
.med-line .nm{font-weight:600;font-size:.92rem}
.med-line .dt{font-size:.78rem;color:var(--muted)}
.stat{font-size:.72rem;font-weight:700;padding:5px 10px;border-radius:10px;white-space:nowrap}
.stat.given{background:#d7f0dd;color:var(--ok)}.stat.refused{background:#fbdcdb;color:var(--bad)}
.stat.held{background:#ecdcf5;color:var(--held)}.stat.due{background:#fdf1d6;color:var(--warn)}
.abtns{display:flex;gap:6px}
.abtns button{border:none;border-radius:8px;padding:9px 11px;font-size:.78rem;font-weight:700;color:#fff;min-height:40px}
.abtns .g{background:var(--ok)}.abtns .r{background:var(--bad)}.abtns .h{background:var(--held)}
.modal-bg{position:fixed;inset:0;background:rgba(10,20,30,.5);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
@media(min-width:600px){.modal-bg.show{align-items:center}.modal{border-radius:16px}}
.fr{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px}
.fr input[type=checkbox]{width:22px;height:22px;flex:0 0 22px}
.fr.ok{border-color:var(--ok);background:#f2faf4}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:#233240;color:#fff;padding:10px 18px;border-radius:20px;font-size:.85rem;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
table.rpt{width:100%;border-collapse:collapse;font-size:.78rem}
table.rpt th,table.rpt td{border:1px solid var(--line);padding:6px;text-align:left}
table.rpt th{background:#eef2f5}
.flag{color:var(--bad);font-weight:700}
.cab-assign{display:flex;align-items:center;justify-content:space-between;padding:9px 6px;border-bottom:1px solid var(--line)}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:none;background:#fff;padding:8px 16px;font-size:.82rem;min-height:40px}
.seg button.on{background:var(--brand);color:#fff;font-weight:700}
.cab-grid{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 2px}
.cab-chip{border:1px solid var(--line);background:#fff;border-radius:18px;padding:8px 12px;font-size:.78rem;font-weight:600;min-height:40px}
.cab-chip.on{color:#fff}
.warn-box{background:#fdf1d6;border:1px solid #eccb7c;border-radius:9px;padding:10px 12px;font-size:.82rem;margin:8px 0}
.err-box{background:#fbdcdb;border:1px solid #e8a5a3;border-radius:9px;padding:10px 12px;font-size:.82rem;margin:8px 0}
.ok-box{background:#d7f0dd;border:1px solid #9ed3ab;border-radius:9px;padding:10px 12px;font-size:.82rem;margin:8px 0}
/* ---- DYMO 30324 label: 2.125in x 2.75in portrait, content vertically CENTERED ---- */
.dlabel{width:2.125in;height:2.75in;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:#fff;color:#000;text-align:center;font-family:-apple-system,Helvetica,Arial,sans-serif;padding:0.08in}
.dl-cabin{font-size:10pt;font-weight:800;letter-spacing:.5px;color:#fff;padding:2pt 10pt;border-radius:8pt;margin-bottom:4pt}
.dl-gender{font-size:8pt;font-weight:700;letter-spacing:1px;margin-bottom:3pt}
.dl-name{font-size:13pt;font-weight:800;line-height:1.1;margin-bottom:4pt}
.dl-pass{font-size:10pt;font-weight:700;margin-bottom:2pt}
.dl-date{font-size:8pt;color:#333;margin-bottom:5pt}
.dl-meds{font-size:8.5pt;line-height:1.25}
.dl-meds .m{margin-bottom:2pt}
.dl-allergy{font-size:7.5pt;font-weight:700;color:#000;border-top:1px solid #000;margin-top:5pt;padding-top:3pt}
.preview-shelf{display:flex;gap:14px;flex-wrap:wrap}
.preview-shelf .dlabel{border:1px dashed #aaa;flex:0 0 auto}
#printRoot{display:none}
@media print{
  body>*:not(#printRoot){display:none !important}
  body{background:#fff;padding:0}
  #printRoot{display:block}
  #printRoot .dlabel{page-break-after:always;break-after:page}
  @page{size:2.125in 2.75in;margin:0}
}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="t">🏕️ Camp MAR</div><div class="sub" id="hdrSub"></div></div>
  <button class="chip" id="nurseChip" onclick="promptNurse()">Set nurse</button>
</div>
<div class="wrap" id="view"></div>
<div class="tabs" id="tabs">
  <button data-v="setup" onclick="go('setup')"><span class="ic">⚙️</span>Setup</button>
  <button data-v="roster" onclick="go('roster')"><span class="ic">🧒</span>Roster</button>
  <button data-v="pass" onclick="go('pass')"><span class="ic">💊</span>Med Pass</button>
  <button data-v="labels" onclick="go('labels')"><span class="ic">🏷️</span>Labels</button>
  <button data-v="rec" onclick="go('rec')"><span class="ic">📋</span>Reconcile</button>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>
<div id="printRoot"></div>
<input type="file" id="fileIn" accept=".json,application/json" style="display:none">
<script>
'use strict';
/* ================= Constants ================= */
const CABINS=[
 {n:'AQUA',c:'#00a6a0'},{n:'RED',c:'#d23c35'},{n:'BLUE',c:'#2274c8'},{n:'GREEN',c:'#2c9e4b'},
 {n:'ORANGE',c:'#e8761a'},{n:'PURPLE',c:'#8e44ad'},{n:'YELLOW',c:'#d4a900'},{n:'PINK',c:'#d63b7f'},
 {n:'NAVY',c:'#1f3a93'},{n:'TEAL',c:'#0b7285'},{n:'LIME',c:'#74b816'},{n:'BROWN',c:'#8d5524'},
 {n:'CORAL',c:'#f0655a'},{n:'MAGENTA',c:'#c02690'},{n:'OLIVE',c:'#6b8e23'},{n:'MAROON',c:'#7d1f2e'},
 {n:'SKY',c:'#3aa6dd'},{n:'GOLD',c:'#b8860b'},{n:'SLATE',c:'#5c6b7a'},{n:'BLACK',c:'#24292e'}
];
const SESSIONS=['RFKC','TRAC-Girls','TRAC-Boys','Custom'];
const PASSES=[
 {k:'breakfast',label:'Breakfast',t:'09:00'},
 {k:'lunch',label:'Lunch',t:'12:00'},
 {k:'afternoon',label:'Afternoon',t:'15:00'},
 {k:'dinner',label:'Dinner',t:'18:00'},
 {k:'bedtime',label:'Bedtime',t:'21:00'},
 {k:'special',label:'Special',t:null}
];
const WIN_BEFORE=60, WIN_AFTER=120; // minutes
const ROUTES=['Oral','Topical','Inhaled','Ophthalmic','Otic','Nasal','Subcutaneous','Intramuscular','Other'];

/* ================= State & Storage (IndexedDB) ================= */
let S=null, curView='pass', db=null;
function uid(){return (crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(36).slice(2));}
function blankState(){return {v:2,deviceId:uid(),camp:null,campers:[],meds:[],log:[],mergeInfo:null,conflicts:[],passCabins:{}};}
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('campMAR',1);
  r.onupgradeneeded=e=>{e.target.result.createObjectStore('kv');};
  r.onsuccess=e=>res(e.target.result);
  r.onerror=e=>rej(e);
});}
function idbGet(key){return new Promise((res,rej)=>{const t=db.transaction('kv').objectStore('kv').get(key);t.onsuccess=()=>res(t.result);t.onerror=rej;});}
function idbSet(key,val){return new Promise((res,rej)=>{const t=db.transaction('kv','readwrite').objectStore('kv').put(val,key);t.onsuccess=res;t.onerror=rej;});}
async function save(){try{await idbSet('state',JSON.parse(JSON.stringify(S)));}catch(e){console.error(e);toast('⚠️ Save failed — export a backup now');}}
async function boot(){
  try{db=await openDB();const st=await idbGet('state');S=st||blankState();}
  catch(e){S=blankState();toast('⚠️ Storage unavailable — data will not persist');}
  if(!S.deviceId)S.deviceId=uid();
  if(!S.passCabins)S.passCabins={};
  if(S.camp&&!S.camp.cabins)S.camp.cabins=CABINS.slice(0,8).map(c=>c.n);
  renderHeader();
  go(S.camp?'pass':'setup');
}
/* ================= Utilities ================= */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return new Date(y,m-1,d).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function fmtDateShort(iso){const[y,m,d]=iso.split('-');return new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'short',month:'numeric',day:'numeric'});}
function fmtTime(hhmm){if(!hhmm)return'';return hhmm.replace(':','')+ '';}
function nowHM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function campDates(){
  if(!S.camp||!S.camp.start||!S.camp.end)return[todayISO()];
  const out=[];let d=new Date(S.camp.start+'T12:00:00');const end=new Date(S.camp.end+'T12:00:00');let i=0;
  while(d<=end&&i<21){out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);i++;}
  return out.length?out:[todayISO()];
}
function cabinColor(n){const c=CABINS.find(x=>x.n===n);return c?c.c:'#666';}
function passOf(k){return PASSES.find(p=>p.k===k);}
function passTime(med,k){if(k==='special')return med.specialTime||'12:00';const p=passOf(k);return p?p.t:null;}
function windowState(dateISO,hhmm){
  if(!hhmm)return'open';
  const now=new Date();
  const t=new Date(dateISO+'T'+hhmm+':00');
  const open=new Date(t.getTime()-WIN_BEFORE*60000), close=new Date(t.getTime()+WIN_AFTER*60000);
  if(now<open)return'soon'; if(now>close)return'closed'; return'open';
}
function myNurseName(){
  if(!S.camp)return sessionStorage.getItem('nurse')||'';
  return S.camp.nurses===2?(S.camp.nurseNames[S.camp.role]||''):(S.camp.nurseNames.A||'');
}
function activeCabinNames(){
  let list=(S.camp&&S.camp.cabins&&S.camp.cabins.length)?S.camp.cabins.slice():CABINS.slice(0,8).map(c=>c.n);
  activeCampers().forEach(c=>{if(c.cabin&&!list.includes(c.cabin))list.push(c.cabin);});
  return CABINS.map(c=>c.n).filter(n=>list.includes(n));
}
function myCabins(){
  if(!S.camp||S.camp.nurses!==2)return activeCabinNames();
  return activeCabinNames().filter(n=>(S.camp.cabinAssign[n]||'A')===S.camp.role);
}
function cabinsForPass(dateISO,passK){
  if(!S.camp||S.camp.nurses!==2)return activeCabinNames();
  const o=(S.passCabins||{})[dateISO+'|'+passK];
  return o?o.filter(n=>activeCabinNames().includes(n)):myCabins();
}
function camperCabinMine(c){return myCabins().includes(c.cabin);}
function activeCampers(){return S.campers.filter(c=>c.active!==false);}
function medsFor(cid){return S.meds.filter(m=>m.camperId===cid&&m.active!==false);}
function findCamper(id){return S.campers.find(c=>c.id===id);}
function findMed(id){return S.meds.find(m=>m.id===id);}
function logFor(medId,dateISO,passK){return S.log.filter(l=>l.medId===medId&&l.date===dateISO&&l.pass===passK).sort((a,b)=>a.ts<b.ts?1:-1)[0];}
function givenCount(medId){return S.log.filter(l=>l.medId===medId&&l.status==='given').length;}
function lastGiven(medId){const g=S.log.filter(l=>l.medId===medId&&l.status==='given').sort((a,b)=>a.ts<b.ts?1:-1);return g[0]||null;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}
function download(filename,text,type){
  const blob=new Blob([text],{type:type||'application/json'});
  const f=new File([blob],filename,{type:blob.type});
  if(navigator.canShare&&navigator.canShare({files:[f]})&&/iPhone|iPad/.test(navigator.userAgent)){
    navigator.share({files:[f],title:filename}).catch(()=>fallbackDL(blob,filename));
  }else fallbackDL(blob,filename);
}
function fallbackDL(blob,filename){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},400);
}
function csvEsc(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
/* ================= Header / Nav ================= */
function renderHeader(){
  const sub=document.getElementById('hdrSub');
  const chip=document.getElementById('nurseChip');
  if(S.camp){
    let role=S.camp.nurses===2?(' · Device '+S.camp.role):'';
    sub.textContent=S.camp.name+' · '+fmtDate(S.camp.start)+'–'+fmtDate(S.camp.end)+role;
    chip.textContent='👩‍⚕️ '+(myNurseName()||'Set nurse');
  }else{sub.textContent='No camp configured';chip.textContent='Set nurse';}
}
function promptNurse(){go('setup');}
function go(v){
  curView=v;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  const el=document.getElementById('view');
  if(v==='setup')el.innerHTML=vSetup();
  else if(v==='roster')el.innerHTML=vRoster();
  else if(v==='pass')el.innerHTML=vPass();
  else if(v==='labels')el.innerHTML=vLabels();
  else if(v==='rec')el.innerHTML=vRec();
  window.scrollTo(0,0);
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
function showModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBg').classList.add('show');}
/* ================= Setup view ================= */
function vSetup(){
  const c=S._draftCamp||S.camp||{name:'',session:'RFKC',start:todayISO(),end:todayISO(),nurses:1,role:'A',nurseNames:{A:'',B:''},cabinAssign:{},cabins:CABINS.slice(0,8).map(x=>x.n)};
  if(!c.cabins)c.cabins=CABINS.slice(0,8).map(x=>x.n);
  const two=c.nurses===2;
  const cabinGrid=CABINS.map(cb=>{
    const on=c.cabins.includes(cb.n);
    return `<button class="cab-chip ${on?'on':''}" style="${on?'background:'+cb.c+';border-color:'+cb.c:''}" onclick="setCabToggle('${cb.n}')">${on?'✓ ':''}${cb.n}</button>`;
  }).join('');
  let cabRows='';
  if(two){
    cabRows=CABINS.filter(cb=>c.cabins.includes(cb.n)).map(cb=>{
      const who=c.cabinAssign[cb.n]||'A';
      return `<div class="cab-assign"><span><span class="cabin-dot" style="background:${cb.c}"></span><b>${cb.n}</b></span>
        <span class="seg">
          <button class="${who==='A'?'on':''}" onclick="setCab('${cb.n}','A')">Nurse A</button>
          <button class="${who==='B'?'on':''}" onclick="setCab('${cb.n}','B')">Nurse B</button>
        </span></div>`;
    }).join('');
  }
  return `
  <div class="card">
    <h2>⚙️ Camp Setup</h2>
    <label>Camp session</label>
    <select id="suSession">${SESSIONS.map(s=>`<option ${c.session===s?'selected':''}>${s}</option>`).join('')}</select>
    <label>Camp name</label>
    <input id="suName" value="${esc(c.name)}" placeholder="e.g. RFKC Summer 2026">
    <div class="row">
      <div><label>Start date</label><input type="date" id="suStart" value="${c.start}"></div>
      <div><label>End date</label><input type="date" id="suEnd" value="${c.end}"></div>
    </div>
    <label>Cabins for this camp — ${c.cabins.length} selected (tap to toggle, up to 20)</label>
    <div class="cab-grid">${cabinGrid}</div>
    <label>Number of nurses for this camp</label>
    <div class="seg" style="width:max-content">
      <button class="${!two?'on':''}" onclick="setNurses(1)">1 nurse</button>
      <button class="${two?'on':''}" onclick="setNurses(2)">2 nurses</button>
    </div>
    ${two?`
      <label>This device belongs to</label>
      <div class="seg" style="width:max-content">
        <button class="${c.role==='A'?'on':''}" onclick="setRole('A')">Device A</button>
        <button class="${c.role==='B'?'on':''}" onclick="setRole('B')">Device B</button>
      </div>
      <div class="row">
        <div><label>Nurse A name</label><input id="suNA" value="${esc(c.nurseNames.A)}"></div>
        <div><label>Nurse B name</label><input id="suNB" value="${esc(c.nurseNames.B)}"></div>
      </div>
      <h3>Default cabin assignment</h3>
      <p class="muted">This is the DEFAULT split. At any med pass, either nurse can change which cabins her device covers for that pass using the 🏘 button in Med Pass. Set the SAME defaults on both devices.</p>
      ${cabRows}
    `:`

function restoreDraft(){

let selDate=null;
function vPass(){
  if(!S.camp)return `<div class="card"><p>Set up the camp first.</p><button class="btn" onclick="go('setup')">Go to Setup</button></div>`;
  const dates=campDates();
  if(!selDate||!dates.includes(selDate))selDate=dates.includes(todayISO())?todayISO():dates[0];
  const two=S.camp.nurses===2;
  let html=`<div class="chips">${dates.map(d=>`<button class="${d===selDate?'on':''}" onclick="selDate='${d}';go('pass')">${fmtDateShort(d)}</button>`).join('')}</div>`;
  if(two)html+=`<p class="muted" style="margin-bottom:6px">Device ${S.camp.role} — default cabins: ${myCabins().join(', ')||'none'}. Tap 🏘 on any pass to change the split for that pass only.</p>`;
  // scheduled passes
  PASSES.forEach(p=>{
    const cabs=cabinsForPass(selDate,p.k);
    const kids=activeCampers().filter(c=>cabs.includes(c.cabin));
    // gather treatments for this pass
    const items=[];
    kids.forEach(c=>{
      medsFor(c.id).forEach(m=>{
        if(m.prn)return;
        if(!m.passes.includes(p.k))return;
        items.push({c,m});
      });
    });
    const anyAll=two&&activeCampers().some(c=>medsFor(c.id).some(m=>!m.prn&&m.passes.includes(p.k)));
    if(!items.length&&!anyAll)return;
    const t=p.k==='special'?null:p.t;
    const ws=p.k==='special'?null:windowState(selDate,p.t);
    const stHtml=(ws&&selDate===todayISO())?`<span class="st ${ws}">${ws==='open'?'WINDOW OPEN':ws==='soon'?'UPCOMING':'WINDOW CLOSED'}</span>`:'';
    const isCustom=!!(S.passCabins||{})[selDate+'|'+p.k];
    const cabBtn=two?`<button class="btn sec sm" onclick="passCabinModal('${p.k}')">🏘${isCustom?' custom':''}</button>`:'';
    html+=`<div class="pass-hd"><b>${p.label}${t?' · '+t.replace(':',''):''}</b><span style="display:flex;gap:6px;align-items:center">${stHtml}${cabBtn}</span></div>`;
    if(!items.length){html+=`<p class="muted" style="margin:4px 0 10px">No cabins on this device for this pass — tap 🏘 to claim cabins.</p>`;}
    // group by cabin
    const byCab={};
    items.forEach(it=>{(byCab[it.c.cabin]=byCab[it.c.cabin]||[]).push(it);});
    CABINS.map(cb=>cb.n).filter(n=>byCab[n]).forEach(cab=>{
      html+=`<div class="cabin-hd"><span class="cabin-dot" style="background:${cabinColor(cab)}"></span>${cab}</div>`;
      byCab[cab].sort((a,b)=>(a.c.lastName+a.c.firstName).localeCompare(b.c.lastName+b.c.firstName));
      byCab[cab].forEach(({c,m})=>{
        const lg=logFor(m.id,selDate,p.k);
        const wt=p.k==='special'?(m.specialTime||''):p.t;
        html+=medLineHTML(c,m,p.k,lg,wt);
      });
    });
  });
  // PRN section
  const prnCabs=cabinsForPass(selDate,'prn');
  const prnItems=[];
  activeCampers().filter(c=>prnCabs.includes(c.cabin)).forEach(c=>medsFor(c.id).forEach(m=>{if(m.prn)prnItems.push({c,m});}));
  const anyPrn=two&&activeCampers().some(c=>medsFor(c.id).some(m=>m.prn));
  if(prnItems.length||anyPrn){
    const prnCustom=!!(S.passCabins||{})[selDate+'|prn'];
    html+=`<div class="pass-hd"><b>PRN — as needed</b>${two?`<button class="btn sec sm" onclick="passCabinModal('prn')">🏘${prnCustom?' custom':''}</button>`:''}</div>`;
    if(!prnItems.length)html+=`<p class="muted" style="margin:4px 0 10px">No PRN cabins on this device — tap 🏘 to claim cabins.</p>`;
    prnItems.sort((a,b)=>(a.c.lastName+a.c.firstName).localeCompare(b.c.lastName+b.c.firstName));
    prnItems.forEach(({c,m})=>{
      const last=lastGiven(m.id);
      let eligTxt='No doses given yet';
      let blocked=false;
      if(last){
        const nextOk=new Date(new Date(last.ts).getTime()+m.prnHours*3600000);
        blocked=new Date()<nextOk;
        eligTxt='Last given '+new Date(last.ts).toLocaleString(undefined,{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})+(blocked?' · next dose OK after '+nextOk.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}):' · eligible now');
      }
      html+=`<div class="med-line"><div style="flex:1">
        <div class="nm">${esc(c.firstName)} ${esc(c.lastName)} — ${esc(m.name)} <span class="tag prn">PRN q${m.prnHours}h</span>${m.controlled?' <span class="tag ctrl">C</span>':''}</div>
        <div class="dt">${esc(m.dose)} · ${esc(m.route)}${m.instructions?' · '+esc(m.instructions):''}</div>
        <div class="dt" style="color:${blocked?'var(--bad)':'var(--ok)'}">${eligTxt}</div></div>
        <div class="abtns"><button class="g" onclick="fiveRights('${c.id}','${m.id}','prn','${selDate}',${blocked})">Give</button></div>
      </div>`;
    });
  }
  if(!html.includes('pass-hd'))html+=`<div class="card"><p class="muted">No treatments scheduled yet. Add campers and medications in the Roster tab.</p></div>`;
  return html;
}
function medLineHTML(c,m,passK,lg,wt){

    </div>`;

  return `<div class="med-line"><div style="flex:1">
    <div class="nm">${esc(c.firstName)} ${esc(c.lastName)} — ${esc(m.name)}${m.controlled?' <span class="tag ctrl">C</span>':''}</div>

    ${m.controlled?`

    <div class="row" style="margin-top:12px">
      <button class="btn sec" onclick="closeModal()">Cancel</button>
      <button class="btn" id="frGo" disabled onclick="confirmGive('${cid}','${mid}','${passK}','${dateISO}',${prnBlocked},'${ws||''}')">Administer — ${esc(nurse)}</button>
    </div>`);
}
function frAll(){
  document.querySelectorAll('#modalBody .fr input[type=checkbox]').forEach(b=>{b.checked=true;b.closest('.fr').classList.add('ok');});
  frCheck();
}
function frCheck(){
  const boxes=document.querySelectorAll('#modalBody .fr input[type=checkbox]');
  const all=Array.from(boxes).every(b=>b.checked);
  const go=document.getElementById('frGo');if(go)go.disabled=!all;
}
function confirmGive(cid,mid,passK,dateISO,prnBlocked,ws){
  const m=findMed(mid);
  let witness='',count=null;
  if(m.controlled){
    witness=(document.getElementById('frW').value||'').trim();
    const cv=document.getElementById('frC').value;
    if(!witness){toast('Witness required for controlled substance');return;}
    if(cv===''){toast('Enter the remaining count');return;}
    count=parseInt(cv,10);
  }
  const notes=(document.getElementById('frN').value||'').trim();
  const flags=[];
  if(prnBlocked)flags.push('PRN-INTERVAL-OVERRIDE');
  if(ws==='closed')flags.push('LATE');
  if(ws==='soon')flags.push('EARLY');
  addLog({camperId:cid,medId:mid,pass:passK,date:dateISO,status:'given',witness,count,notes,flags});
  closeModal();go('pass');toast('Recorded ✓');
}
function quickLog(cid,mid,passK,status){
  const nurse=myNurseName();
  if(!nurse){toast('Set the nurse name in Setup first');go('setup');return;}
  const c=findCamper(cid),m=findMed(mid);
  showModal(`<h2>${status==='refused'?'🚫 Refused':'⏸️ Held'} — ${esc(m.name)}</h2>
    <p class="muted">${esc(c.firstName)} ${esc(c.lastName)} · ${fmtDate(selDate)} · ${passOf(passK)?passOf(passK).label:passK}</p>
    <label>Reason / notes</label><input id="qlN" placeholder="${status==='refused'?'Camper refused; parent notified…':'Held per protocol / provider…'}">
    <div class="row" style="margin-top:12px">
      <button class="btn sec" onclick="closeModal()">Cancel</button>
      <button class="btn ${status==='refused'?'bad':''}" onclick="doQuickLog('${cid}','${mid}','${passK}','${status}')">Record ${status}</button>
    </div>`);
}
function doQuickLog(cid,mid,passK,status){
  const notes=(document.getElementById('qlN').value||'').trim();
  addLog({camperId:cid,medId:mid,pass:passK,date:selDate,status,notes,witness:'',count:null,flags:[]});
  closeModal();go('pass');toast('Recorded ✓');
}
function addLog(e){
  S.log.push({
    id:uid(),ts:new Date().toISOString(),
    deviceId:S.deviceId,role:S.camp&&S.camp.nurses===2?S.camp.role:'A',
    nurse:myNurseName(),
    camperId:e.camperId,medId:e.medId,pass:e.pass,date:e.date,
    status:e.status,notes:e.notes||'',witness:e.witness||'',count:e.count==null?null:e.count,
    flags:e.flags||[]
  });
  save();
}
/* ================= Per-pass cabin split (2-nurse mode) ================= */
function passCabinModal(passK){
  const cur=cabinsForPass(selDate,passK);
  const p=passK==='prn'?{label:'PRN'}:passOf(passK);
  showModal(`<h2>🏘 Cabins for ${p.label} — ${fmtDateShort(selDate)}</h2>
    <p class="muted">Check the cabins THIS device (Device ${S.camp.role}) covers for this pass. The other nurse's device should cover the rest. Applies to this date + pass only; other passes keep the default split.</p>
    ${activeCabinNames().map(n=>`<div class="fr"><input type="checkbox" class="pcCab" value="${n}" ${cur.includes(n)?'checked':''}>
      <div><span class="cabin-dot" style="background:${cabinColor(n)}"></span><b>${n}</b> <span class="muted">default: Nurse ${(S.camp.cabinAssign[n]||'A')}</span></div></div>`).join('')}
    <div class="row" style="margin-top:12px">
      <button class="btn sec" onclick="resetPassCabins('${passK}')">Reset to default</button>
      <button class="btn" onclick="savePassCabins('${passK}')">Save split</button>
    </div>`);
}
function savePassCabins(passK){
  const sel=Array.from(document.querySelectorAll('.pcCab:checked')).map(x=>x.value);
  S.passCabins=S.passCabins||{};
  S.passCabins[selDate+'|'+passK]=sel;
  save();closeModal();go('pass');toast('Cabin split saved for this pass');
}
function resetPassCabins(passK){
  if(S.passCabins)delete S.passCabins[selDate+'|'+passK];
  save();closeModal();go('pass');toast('Back to default split');
}
/* ================= Labels (DYMO 30324, portrait, content centered) ================= */
let lblDate=null,lblPass='breakfast';
function vLabels(){
  if(!S.camp)return `<div class="card"><p>Set up the camp first.</p><button class="btn" onclick="go('setup')">Go to Setup</button></div>`;
  const dates=campDates();
  if(!lblDate||!dates.includes(lblDate))lblDate=dates.includes(todayISO())?todayISO():dates[0];
  const batch=labelBatch(lblDate,lblPass);
  return `<div class="card">
    <h2>🏷️ Labels — DYMO 30324 (2⅛ × 2¾ in)</h2>
    <p class="muted">One label per camper per pass. Content is centered vertically on the label.${S.camp.nurses===2?' Batch follows this device’s cabin split for the selected pass and date.':''}</p>
    <label>Date</label>
    <div class="chips">${dates.map(d=>`<button class="${d===lblDate?'on':''}" onclick="lblDate='${d}';go('labels')">${fmtDateShort(d)}</button>`).join('')}</div>
    <label>Pass</label>
    <div class="chips">${PASSES.map(p=>`<button class="${p.k===lblPass?'on':''}" onclick="lblPass='${p.k}';go('labels')">${p.label}</button>`).join('')}</div>
    <div class="row" style="margin-top:8px">
      <button class="btn" ${batch.length?'':'disabled'} onclick="printBatch()">🖨️ Print ${batch.length} label${batch.length===1?'':'s'}</button>
    </div>
    <p class="muted" style="margin-top:8px">Printing: connect the DYMO to a computer with DYMO Connect, open this same file there, and print — or AirPrint if your printer supports it. In the print dialog choose the 30324 label size with no margins.</p>
  </div>
  <div class="card">
    <h3>Preview (actual size)</h3>
    ${batch.length?`<div class="preview-shelf">${batch.slice(0,6).map(b=>labelHTML(b.c,b.title,b.meds,lblDate)).join('')}</div>
    ${batch.length>6?`<p class="muted">…and ${batch.length-6} more.</p>`:''}`:'<p class="muted">No treatments for this pass/date on this device.</p>'}
  </div>`;
}
function labelBatch(dateISO,passK){
  const mine=cabinsForPass(dateISO,passK);
  const kids=activeCampers().filter(c=>mine.includes(c.cabin));
  const out=[];
  kids.forEach(c=>{
    const meds=medsFor(c.id).filter(m=>passK==='prn'?m.prn:(!m.prn&&m.passes.includes(passK)));
    if(!meds.length)return;
    const p=passOf(passK);
    const t=passK==='prn'?'as needed':(passK==='special'?(meds[0].specialTime||''):p.t);
    const title=(p?p.label:'PRN')+(t&&t!=='as needed'?' — '+t.replace(':',''):passK==='prn'?' — as needed':'');
    out.push({c,meds,title});
  });
  out.sort((a,b)=>{
    const ca=CABINS.findIndex(x=>x.n===a.c.cabin),cb=CABINS.findIndex(x=>x.n===b.c.cabin);
    if(ca!==cb)return ca-cb;
    return (a.c.lastName+a.c.firstName).localeCompare(b.c.lastName+b.c.firstName);
  });
  return out;
}
/* single shared renderer — used by BOTH the preview panel and the print path */
function labelHTML(c,title,meds,dateISO){
  return `<div class="dlabel">
    <div class="dl-cabin" style="background:${cabinColor(c.cabin)}">${esc(c.cabin)}</div>
    <div class="dl-gender">${esc(c.gender||'')}</div>
    <div class="dl-name">${esc(c.firstName)}<br>${esc(c.lastName)}</div>
    <div class="dl-pass">${esc(title)}</div>
    <div class="dl-date">${fmtDate(dateISO)}</div>
    <div class="dl-meds">${meds.map(m=>`<div class="m">${esc(m.name)} ${esc(m.dose)}${m.route&&m.route!=='Oral'?' ('+esc(m.route)+')':''}${m.controlled?' 🔒':''}</div>`).join('')}</div>
    ${c.allergies&&!/^\s*(nkda|none)\s*$/i.test(c.allergies)?`<div class="dl-allergy">⚠️ ${esc(c.allergies)}</div>`:''}
  </div>`;
}
function printBatch(){
  const batch=labelBatch(lblDate,lblPass);
  if(!batch.length)return;
  printLabels(batch.map(b=>labelHTML(b.c,b.title,b.meds,lblDate)));
}
function printCamperLabels(cid){
  const c=findCamper(cid);
  const d=campDates().includes(todayISO())?todayISO():campDates()[0];
  const html=[];
  PASSES.concat([{k:'prn'}]).forEach(p=>{
    const meds=medsFor(cid).filter(m=>p.k==='prn'?m.prn:(!m.prn&&m.passes.includes(p.k)));
    if(!meds.length)return;
    const pd=passOf(p.k);
    const t=p.k==='prn'?'':(p.k==='special'?(meds[0].specialTime||''):pd.t);
    const title=(pd?pd.label:'PRN')+(t?' — '+t.replace(':',''):p.k==='prn'?' — as needed':'');
    html.push(labelHTML(c,title,meds,d));
  });
  if(!html.length){toast('No medications for this camper');return;}
  printLabels(html);
}
function printLabels(labelHtmlArr){
  const root=document.getElementById('printRoot');
  root.innerHTML=labelHtmlArr.join('');
  setTimeout(()=>{window.print();setTimeout(()=>{root.innerHTML='';},1000);},60);
}
/* ================= Reconcile: merge, reports, backup ================= */
function vRec(){
  if(!S.camp)return `<div class="card"><p>Set up the camp first.</p><button class="btn" onclick="go('setup')">Go to Setup</button></div>`;
  const two=S.camp.nurses===2;
  const mi=S.mergeInfo;
  let mergeCard='';
  if(two){
    mergeCard=`<div class="card">
      <h2>🔄 Two-device merge</h2>
      <p class="muted">This is Device ${S.camp.role} (${esc(S.camp.nurseNames[S.camp.role]||'')}). At end of camp: the OTHER device taps “Export merge file”, sends it here (AirDrop / Files), then this device imports it. All reports below then cover both devices.</p>
      <div class="row">
        <button class="btn blue" onclick="exportMerge()">📤 Export merge file</button>
        <button class="btn" onclick="pickFile('merge')">📥 Import merge file</button>
      </div>
      ${mi?`<div class="ok-box" style="margin-top:10px">Merged: ${mi.entries} entr${mi.entries===1?'y':'ies'} from Device ${mi.fromRole} (${esc(mi.fromNurse||'')}) on ${new Date(mi.at).toLocaleString()}. ${mi.newCampers?mi.newCampers+' camper(s) and ':''}${mi.newMeds?mi.newMeds+' medication(s) added from the other device.':''}</div>`:''}
      ${S.conflicts&&S.conflicts.length?`<div class="err-box"><b>⚠️ ${S.conflicts.length} conflict${S.conflicts.length===1?'':'s'} — same med given on BOTH devices:</b><br>${S.conflicts.map(cf=>{
        const c=findCamper(cf.camperId),m=findMed(cf.medId);
        return `${c?esc(c.firstName+' '+c.lastName):'?'} — ${m?esc(m.name):'?'} · ${fmtDate(cf.date)} ${cf.pass}`;
      }).join('<br>')}<br><span class="muted">Both entries are kept in the log and flagged DUPLICATE — review before finalizing.</span></div>`:''}
    </div>`;
  }
  return mergeCard+`
  <div class="card">
    <h2>📋 Reconciliation reports</h2>
    <p class="muted">Log entries on this device: ${S.log.length}${two&&mi?' (includes merged Device '+mi.fromRole+' data)':''}</p>
    <div class="row">
      <button class="btn" onclick="exportMAR()">📄 Full MAR (CSV)</button>
      <button class="btn sec" onclick="showMissed()">Missed doses</button>
      <button class="btn sec" onclick="showControlled()">Controlled counts</button>
    </div>
  </div>
  <div class="card">
    <h2>💾 Backup & restore</h2>
    <p class="muted">Export a full backup each night — if a device is lost or iOS clears storage, restore from the latest file.</p>
    <div class="row">
      <button class="btn sec" onclick="exportBackup()">Export backup (JSON)</button>
      <button class="btn sec" onclick="pickFile('backup')">Restore from backup</button>
    </div>
  </div>`;
}
/* ---- merge ---- */
function exportMerge(){
  const payload={type:'campMAR-merge',v:2,deviceId:S.deviceId,
    role:S.camp.nurses===2?S.camp.role:'A',nurse:myNurseName(),exportedAt:new Date().toISOString(),
    camp:{name:S.camp.name,start:S.camp.start,end:S.camp.end},
    campers:S.campers,meds:S.meds,log:S.log};
  const fn='campMAR-merge-Device'+payload.role+'-'+todayISO()+'.json';
  download(fn,JSON.stringify(payload));
  toast('Merge file exported — send it to the other device');
}
let _fileMode='merge';
function pickFile(mode){_fileMode=mode;const f=document.getElementById('fileIn');f.value='';f.click();}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('fileIn').addEventListener('change',ev=>{
    const file=ev.target.files[0];if(!file)return;
    const rd=new FileReader();
    rd.onload=()=>{try{
      const data=JSON.parse(rd.result);
      if(_fileMode==='merge')importMerge(data);else importBackup(data);
    }catch(e){toast('Could not read that file');}};
    rd.readAsText(file);
  });
});
function importMerge(d){
  if(!d||d.type!=='campMAR-merge'){toast('Not a Camp MAR merge file');return;}
  if(d.deviceId===S.deviceId){toast('That file came from THIS device');return;}
  if(d.camp&&S.camp&&(d.camp.name!==S.camp.name)){
    if(!confirm('Camp name in file ("'+d.camp.name+'") differs from this device ("'+S.camp.name+'"). Merge anyway?'))return;
  }
  // bring over campers/meds this device doesn't have (dedupe by id)
  let newC=0,newM=0;
  (d.campers||[]).forEach(c=>{if(!findCamper(c.id)){S.campers.push(c);newC++;}});
  (d.meds||[]).forEach(m=>{if(!findMed(m.id)){S.meds.push(m);newM++;}});
  // merge log entries, dedupe by id
  const have=new Set(S.log.map(l=>l.id));
  let added=0;
  (d.log||[]).forEach(l=>{if(!have.has(l.id)){S.log.push(l);added++;}});
  // conflict detection: same camper+med+date+pass GIVEN by different devices
  const seen={};const conflicts=[];
  S.log.filter(l=>l.status==='given').forEach(l=>{
    const k=l.camperId+'|'+l.medId+'|'+l.date+'|'+l.pass;
    if(seen[k]&&seen[k]!==l.deviceId){
      conflicts.push({camperId:l.camperId,medId:l.medId,date:l.date,pass:l.pass});
      l.flags=Array.from(new Set([...(l.flags||[]),'DUPLICATE']));
      S.log.filter(x=>x.status==='given'&&x.camperId===l.camperId&&x.medId===l.medId&&x.date===l.date&&x.pass===l.pass)
        .forEach(x=>x.flags=Array.from(new Set([...(x.flags||[]),'DUPLICATE'])));
    }else seen[k]=l.deviceId;
  });
  S.conflicts=conflicts;
  S.mergeInfo={at:new Date().toISOString(),fromRole:d.role,fromNurse:d.nurse,fromDevice:d.deviceId,entries:added,newCampers:newC,newMeds:newM};
  save();go('rec');
  toast('Merged '+added+' entries'+(conflicts.length?' — '+conflicts.length+' conflict(s) to review':' ✓'));
}
/* ---- reports ---- */
function exportMAR(){
  const rows=[['Date','Pass','Scheduled time','Cabin','Camper','DOB','Medication','Dose','Route','Status','Recorded at','Nurse','Device','Witness','Count after','Flags','Notes']];
  const sorted=[...S.log].sort((a,b)=>(a.date+a.pass+a.ts).localeCompare(b.date+b.pass+b.ts));
  sorted.forEach(l=>{
    const c=findCamper(l.camperId)||{},m=findMed(l.medId)||{};
    rows.push([l.date,l.pass,l.pass==='prn'?'PRN':(passTime(m,l.pass)||''),c.cabin||'',(c.lastName||'')+', '+(c.firstName||''),c.dob||'',
      m.name||'',m.dose||'',m.route||'',l.status,new Date(l.ts).toLocaleString(),l.nurse||'','Device '+(l.role||'A'),
      l.witness||'',l.count==null?'':l.count,(l.flags||[]).join(' '),l.notes||'']);
  });
  const csv=rows.map(r=>r.map(csvEsc).join(',')).join('\r\n');
  download('campMAR-'+(S.camp.name.replace(/\W+/g,'_'))+'-reconciliation-'+todayISO()+'.csv',csv,'text/csv');
  toast('Reconciliation CSV exported');
}
function missedList(){
  const out=[];const today=todayISO();
  campDates().filter(d=>d<=today).forEach(d=>{
    activeCampers().forEach(c=>{
      medsFor(c.id).forEach(m=>{
        if(m.prn)return;
        m.passes.forEach(pk=>{
          if(!logFor(m.id,d,pk)){
            if(d===today){const t=passTime(m,pk);if(t&&windowState(d,t)!=='closed')return;}
            out.push({d,pk,c,m});
          }
        });
      });
    });
  });
  return out;
}
function showMissed(){
  const list=missedList();
  showModal(`<h2>❗ Missed / undocumented doses</h2>
    <p class="muted">Scheduled treatments (all cabins, both devices after merge) with no record, for passes whose window has closed.</p>
    ${list.length?`<table class="rpt"><tr><th>Date</th><th>Pass</th><th>Camper</th><th>Medication</th></tr>
      ${list.map(x=>`<tr><td>${fmtDateShort(x.d)}</td><td>${passOf(x.pk)?passOf(x.pk).label:x.pk}</td><td>${esc(x.c.firstName+' '+x.c.lastName)} (${x.c.cabin})</td><td>${esc(x.m.name)} ${esc(x.m.dose)}</td></tr>`).join('')}</table>
      <button class="btn sec blk sm" style="margin-top:10px" onclick="exportMissed()">Export CSV</button>`
    :'<div class="ok-box">No missed doses 🎉</div>'}
    <button class="btn blk" style="margin-top:10px" onclick="closeModal()">Close</button>`);
}
function exportMissed(){
  const rows=[['Date','Pass','Cabin','Camper','Medication','Dose']];
  missedList().forEach(x=>rows.push([x.d,x.pk,x.c.cabin,x.c.lastName+', '+x.c.firstName,x.m.name,x.m.dose]));
  download('campMAR-missed-doses-'+todayISO()+'.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\r\n'),'text/csv');
}
function showControlled(){
  const meds=S.meds.filter(m=>m.controlled&&m.active!==false);
  const rows=meds.map(m=>{
    const c=findCamper(m.camperId)||{};
    const given=givenCount(m.id);
    const expected=m.startCount!=null?m.startCount-given:null;
    const lastCnt=(()=>{const g=S.log.filter(l=>l.medId===m.id&&l.count!=null).sort((a,b)=>a.ts<b.ts?1:-1);return g.length?g[0].count:null;})();
    const ok=expected==null||lastCnt==null||expected===lastCnt;
    return {m,c,given,expected,lastCnt,ok};
  });
  showModal(`<h2>🔒 Controlled substance reconciliation</h2>
    ${rows.length?`<table class="rpt"><tr><th>Camper</th><th>Medication</th><th>Start</th><th>Given</th><th>Expected left</th><th>Last count</th><th></th></tr>
    ${rows.map(r=>`<tr><td>${esc((r.c.firstName||'')+' '+(r.c.lastName||''))}</td><td>${esc(r.m.name)}</td><td>${r.m.startCount??'—'}</td><td>${r.given}</td><td>${r.expected??'—'}</td><td>${r.lastCnt??'—'}</td><td>${r.ok?'✓':'<span class="flag">MISMATCH</span>'}</td></tr>`).join('')}</table>`
    :'<p class="muted">No controlled medications.</p>'}
    <p class="muted" style="margin-top:8px">Counts assume 1 unit per administration; the recorded “count after” at each dose is authoritative. Investigate any mismatch with the witness log in the full MAR export.</p>
    <button class="btn blk" style="margin-top:10px" onclick="closeModal()">Close</button>`);
}
/* ---- backup ---- */
function exportBackup(){
  download('campMAR-backup-Device'+(S.camp&&S.camp.nurses===2?S.camp.role:'A')+'-'+todayISO()+'.json',
    JSON.stringify({type:'campMAR-backup',v:2,savedAt:new Date().toISOString(),state:S}));
  toast('Backup exported');
}
function importBackup(d){
  if(!d||d.type!=='campMAR-backup'||!d.state){toast('Not a Camp MAR backup file');return;}
  if(!confirm('Restore this backup? It REPLACES everything currently on this device.'))return;
  S=d.state;save();renderHeader();go('rec');toast('Backup restored ✓');
}

   Silently skipped when opened as a local file. */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
boot();
